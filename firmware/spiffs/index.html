<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AutoEdging 控制面板</title>
  <link rel="stylesheet" href="/app.css" />
</head>
<body>
  <div class="container">
    <header class="card header">
      <div class="header-main">
        <div class="title">
          <div class="label">AutoEdging</div>
          <div class="subtitle">ESP-IDF Web 控制面板</div>
        </div>
        <nav class="page-nav page-nav--header" aria-label="页面切换">
          <button type="button" class="tab-btn active" data-page="page-game">寸止游戏</button>
          <button type="button" class="tab-btn" data-page="page-manual">手动模式</button>
          <button type="button" class="tab-btn" data-page="page-system">系统设置</button>
        </nav>
      </div>
      <div class="status">
        <span id="conn" class="badge offline">离线</span>
        <div class="metric">
          <div class="metric-label">压力</div>
          <div class="metric-value metric-value--pressure" id="pressure">--.- kPa</div>
        </div>
      </div>
    </header>

    <main id="page-game" class="page is-active">
      <section class="card chart-card">
        <div class="chart-header">
          <div class="chart-title">压力曲线</div>
          <div class="chart-meta" id="chart-meta">最近 60 秒</div>
        </div>
        <div class="chart-wrap">
          <canvas id="chart"></canvas>
        </div>
      </section>

      <section class="card outputs">
        <div class="section-title">输出状态</div>
        <div class="output-grid">
          <div class="output-item">
            <div class="output-label">DAC</div>
            <div class="output-value" id="dac">--.- V</div>
          </div>
          <div class="output-item">
            <div class="output-label">跳蛋强度</div>
            <div class="output-value" id="pwm">-- / -- / -- / --</div>
          </div>
          <div class="output-item">
            <div class="output-label">BLE Belt</div>
            <div class="output-value" id="ble">swing --, vibrate --</div>
          </div>
        </div>
      </section>

      <section class="card game-control">
        <div class="section-title">游戏控制</div>
        <div class="output-grid">
          <div class="output-item">
            <div class="output-label">状态</div>
            <div class="output-value" id="game-state">--</div>
          </div>
          <div class="output-item">
            <div class="output-label">强度</div>
            <div class="output-value" id="game-intensity">--</div>
          </div>
          <div class="output-item">
            <div class="output-label">目标强度</div>
            <div class="output-value" id="game-target">--</div>
          </div>
          <div class="output-item">
            <div class="output-label">压力 (Avg)</div>
            <div class="output-value" id="game-pressure">--</div>
          </div>
          <div class="output-item">
            <div class="output-label">中压 / 临界</div>
            <div class="output-value" id="game-thresholds">--</div>
          </div>
          <div class="output-item">
            <div class="output-label">寸止 / 电击</div>
            <div class="output-value" id="game-counts">--</div>
          </div>
          <div class="output-item">
            <div class="output-label">刺激时长</div>
            <div class="output-value" id="game-stim-time">--</div>
          </div>
        </div>
        <div class="actions">
          <button id="btn-game-start" class="btn primary">开始</button>
          <button id="btn-game-pause" class="btn">暂停</button>
          <button id="btn-game-stop" class="btn danger">停止</button>
          <button id="btn-game-shock" class="btn danger">电击一次</button>
        </div>
        <div id="game-toast" class="toast"></div>
      </section>

      <section class="card game-config">
        <div class="section-title">游戏参数</div>
        <div class="form">
          <div class="field">
            <label>游戏时长 (分钟)<button type="button" class="help-btn" data-help-title="游戏时长" data-help="达到该时长后自动结束游戏并关闭所有输出。">?</button></label>
            <input id="game-duration" type="number" min="1" max="120" />
          </div>
          <div class="field">
            <label>临界气压 (kPa)<button type="button" class="help-btn" data-help-title="临界气压" data-help="当气压 P >= 临界气压时进入过载，强度强制为 0，并触发一次电击计数。">?</button></label>
            <input id="game-critical" type="number" step="0.1" />
          </div>
          <div class="field">
            <label>中间压力 (kPa)<button type="button" class="help-btn" data-help-title="中间压力" data-help="当气压 P > 中间压力时进入中期抑制；过载后必须回落到 P < 中间压力才会开始冷却倒计时。">?</button></label>
            <input id="game-mid" type="number" step="0.1" />
          </div>
          <div class="field">
            <label>最大强度<button type="button" class="help-btn" data-help-title="最大强度" data-help="目标强度范围 0..最大强度，同时用于跳蛋强度/BLE 的强度映射与分档。">?</button></label>
            <input id="game-max" type="number" min="1" max="255" />
          </div>
          <div class="field">
            <label>冷静时间 (秒)<button type="button" class="help-btn" data-help-title="冷静时间" data-help="寸止后回落到 P < 中间压力开始计时；倒计时结束才恢复刺激累积。">?</button></label>
            <input id="game-delay" type="number" min="0" max="120" />
          </div>
          <div class="field">
            <label>强度递增速率上限 (每秒)<button type="button" class="help-btn" data-help-title="递增速率上限" data-help="强度上升时的最大变化速度(每秒)。下降不限制，会立即下调到目标值。">?</button></label>
            <input id="game-rate" type="number" min="0" max="10" step="0.1" />
          </div>
          <div class="field">
            <label>压力敏感度系数<button type="button" class="help-btn" data-help-title="压力敏感度系数" data-help="用于冷却结束后的基础强度计算：base = max * (P_critical - P) / (P_critical - pressureSensitivity)。">?</button></label>
            <input id="game-sensitivity" type="number" min="0" max="30" step="0.1" />
          </div>
          <div class="field">
            <label>强度随机扰动 (%)<button type="button" class="help-btn" data-help-title="强度随机扰动" data-help="在累积期给强度乘以随机因子 (1 ± random%)，制造不可预测的波动。">?</button></label>
            <input id="game-random" type="number" min="0" max="100" />
          </div>
          <div class="field">
            <label>扰动间隔 (秒)<button type="button" class="help-btn" data-help-title="扰动间隔" data-help="每次随机扰动之间的时间间隔。到达最大强度后也会按该间隔继续扰动。">?</button></label>
            <input id="game-random-interval" type="number" min="0.1" max="10" step="0.1" />
          </div>
          <div class="field">
            <label>延迟后逐步提升 (每秒)<button type="button" class="help-btn" data-help-title="逐步提升" data-help="在平静/累积阶段每秒增加的基础强度。">?</button></label>
            <input id="game-increase" type="number" min="0" max="50" step="0.1" />
          </div>
          <div class="field">
            <label>电击电压 (V)<button type="button" class="help-btn" data-help-title="电击电压" data-help="使用Type-C线连接到郊狼的按钮配件Type-C口，使用 DAC 输出电压(<=2.1V)。建议 >1V 直接触发外部模块最大强度；<0.5V 视为不电击。">?</button></label>
            <input id="game-shock-voltage" type="number" min="0" max="2.1" step="0.1" />
          </div>
          <div class="field">
            <label>中期最低强度<button type="button" class="help-btn" data-help-title="中期最低强度" data-help="MIDDLE 状态强度随压力逼近临界时的下限值(默认 5)。越过临界仍会瞬间降为 0。">?</button></label>
            <input id="game-mid-min" type="number" min="0" max="255" step="0.1" />
          </div>
          <div class="field dual-slider-field">
            <label>跳蛋强度1 范围 (%)<button type="button" class="help-btn" data-help-title="跳蛋强度1 范围" data-help="左侧手柄为最低输出，右侧手柄为最高输出。游戏强度会映射到该范围。">?</button></label>
            <div class="dual-range">
              <div class="dual-range-track"></div>
              <div class="dual-range-fill" id="game-pwm0-fill"></div>
              <input id="game-pwm0-min" class="range-input dual-range-input min" type="range" min="0" max="100" step="0.1" />
              <input id="game-pwm0" class="range-input dual-range-input max" type="range" min="0" max="100" step="0.1" />
            </div>
            <div class="dual-range-values">
              <label class="dual-range-value-field">最低
                <input id="game-pwm0-min-value" class="dual-range-value-input" type="number" min="0" max="100" step="0.1" value="0.0" data-range-key="pwm0" data-range-edge="min" />
                <span class="unit">%</span>
              </label>
              <label class="dual-range-value-field">最高
                <input id="game-pwm0-value" class="dual-range-value-input" type="number" min="0" max="100" step="0.1" value="0.0" data-range-key="pwm0" data-range-edge="max" />
                <span class="unit">%</span>
              </label>
            </div>
          </div>
          <div class="field dual-slider-field">
            <label>跳蛋强度2 范围 (%)<button type="button" class="help-btn" data-help-title="跳蛋强度2 范围" data-help="左侧手柄为最低输出，右侧手柄为最高输出。游戏强度会映射到该范围。">?</button></label>
            <div class="dual-range">
              <div class="dual-range-track"></div>
              <div class="dual-range-fill" id="game-pwm1-fill"></div>
              <input id="game-pwm1-min" class="range-input dual-range-input min" type="range" min="0" max="100" step="0.1" />
              <input id="game-pwm1" class="range-input dual-range-input max" type="range" min="0" max="100" step="0.1" />
            </div>
            <div class="dual-range-values">
              <label class="dual-range-value-field">最低
                <input id="game-pwm1-min-value" class="dual-range-value-input" type="number" min="0" max="100" step="0.1" value="0.0" data-range-key="pwm1" data-range-edge="min" />
                <span class="unit">%</span>
              </label>
              <label class="dual-range-value-field">最高
                <input id="game-pwm1-value" class="dual-range-value-input" type="number" min="0" max="100" step="0.1" value="0.0" data-range-key="pwm1" data-range-edge="max" />
                <span class="unit">%</span>
              </label>
            </div>
          </div>
          <div class="field dual-slider-field">
            <label>跳蛋强度3 范围 (%)<button type="button" class="help-btn" data-help-title="跳蛋强度3 范围" data-help="左侧手柄为最低输出，右侧手柄为最高输出。游戏强度会映射到该范围。">?</button></label>
            <div class="dual-range">
              <div class="dual-range-track"></div>
              <div class="dual-range-fill" id="game-pwm2-fill"></div>
              <input id="game-pwm2-min" class="range-input dual-range-input min" type="range" min="0" max="100" step="0.1" />
              <input id="game-pwm2" class="range-input dual-range-input max" type="range" min="0" max="100" step="0.1" />
            </div>
            <div class="dual-range-values">
              <label class="dual-range-value-field">最低
                <input id="game-pwm2-min-value" class="dual-range-value-input" type="number" min="0" max="100" step="0.1" value="0.0" data-range-key="pwm2" data-range-edge="min" />
                <span class="unit">%</span>
              </label>
              <label class="dual-range-value-field">最高
                <input id="game-pwm2-value" class="dual-range-value-input" type="number" min="0" max="100" step="0.1" value="0.0" data-range-key="pwm2" data-range-edge="max" />
                <span class="unit">%</span>
              </label>
            </div>
          </div>
          <div class="field dual-slider-field">
            <label>跳蛋强度4 范围 (%)<button type="button" class="help-btn" data-help-title="跳蛋强度4 范围" data-help="左侧手柄为最低输出，右侧手柄为最高输出。游戏强度会映射到该范围。">?</button></label>
            <div class="dual-range">
              <div class="dual-range-track"></div>
              <div class="dual-range-fill" id="game-pwm3-fill"></div>
              <input id="game-pwm3-min" class="range-input dual-range-input min" type="range" min="0" max="100" step="0.1" />
              <input id="game-pwm3" class="range-input dual-range-input max" type="range" min="0" max="100" step="0.1" />
            </div>
            <div class="dual-range-values">
              <label class="dual-range-value-field">最低
                <input id="game-pwm3-min-value" class="dual-range-value-input" type="number" min="0" max="100" step="0.1" value="0.0" data-range-key="pwm3" data-range-edge="min" />
                <span class="unit">%</span>
              </label>
              <label class="dual-range-value-field">最高
                <input id="game-pwm3-value" class="dual-range-value-input" type="number" min="0" max="100" step="0.1" value="0.0" data-range-key="pwm3" data-range-edge="max" />
                <span class="unit">%</span>
              </label>
            </div>
          </div>
        </div>
        <div class="actions">
          <button id="btn-game-save" class="btn primary">保存</button>
          <button id="btn-game-reset" class="btn danger">恢复默认</button>
        </div>
        <div class="toast" id="game-config-toast"></div>
      </section>
    </main>

    <main id="page-manual" class="page">
      <section class="card manual-config">
        <div class="section-title">手动模式</div>
        <div class="form manual-form">
          <div class="field">
            <label>DAC Code (0-4095)</label>
            <input id="cfg-dac-code" type="number" min="0" max="4095" />
          </div>
          <div class="field">
            <label>DAC Power-Down</label>
            <select id="cfg-dac-pd">
              <option value="0">Normal</option>
              <option value="1">1K</option>
              <option value="2">100K</option>
              <option value="3">Hi-Z</option>
            </select>
          </div>

          <div class="field slider-field">
            <label for="cfg-pwm0">跳蛋强度1 (%)</label>
            <div class="slider-row">
              <input id="cfg-pwm0" class="range-input" type="range" min="0" max="100" step="0.1" />
              <output id="cfg-pwm0-value" class="slider-value">0.0%</output>
            </div>
          </div>
          <div class="field slider-field">
            <label for="cfg-pwm1">跳蛋强度2 (%)</label>
            <div class="slider-row">
              <input id="cfg-pwm1" class="range-input" type="range" min="0" max="100" step="0.1" />
              <output id="cfg-pwm1-value" class="slider-value">0.0%</output>
            </div>
          </div>
          <div class="field slider-field">
            <label for="cfg-pwm2">跳蛋强度3 (%)</label>
            <div class="slider-row">
              <input id="cfg-pwm2" class="range-input" type="range" min="0" max="100" step="0.1" />
              <output id="cfg-pwm2-value" class="slider-value">0.0%</output>
            </div>
          </div>
          <div class="field slider-field">
            <label for="cfg-pwm3">跳蛋强度4 (%)</label>
            <div class="slider-row">
              <input id="cfg-pwm3" class="range-input" type="range" min="0" max="100" step="0.1" />
              <output id="cfg-pwm3-value" class="slider-value">0.0%</output>
            </div>
          </div>

          <div class="field">
            <label>BLE Swing (1-9)</label>
            <div class="inline-control">
              <select id="cfg-ble-swing">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
                <option value="7">7</option>
                <option value="8">8</option>
                <option value="9">9</option>
              </select>
              <button id="btn-ble-swing-stop" type="button" class="btn">一键停止</button>
            </div>
          </div>
          <div class="field">
            <label>BLE Vibrate (1-9)</label>
            <div class="inline-control">
              <select id="cfg-ble-vibrate">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
                <option value="7">7</option>
                <option value="8">8</option>
                <option value="9">9</option>
              </select>
              <button id="btn-ble-vibrate-stop" type="button" class="btn">一键停止</button>
            </div>
          </div>
        </div>

        <div class="actions">
          <button id="btn-manual-save" class="btn primary">保存输出</button>
          <button id="btn-manual-reset" class="btn danger">重置输出</button>
        </div>
        <div id="manual-toast" class="toast"></div>
      </section>
    </main>

    <main id="page-system" class="page">
      <section class="card system-config">
        <div class="section-title">系统设置</div>
        <div class="form">
          <div class="field">
            <label>采样频率 (Hz)</label>
            <input id="cfg-sample" type="number" min="1" max="100" />
          </div>
          <div class="field">
            <label>WS 推送 (Hz)</label>
            <input id="cfg-ws" type="number" min="1" max="20" />
          </div>
          <div class="field">
            <label>曲线窗口 (秒)</label>
            <input id="cfg-window" type="number" min="30" max="120" />
          </div>
          <div class="field">
            <label>RGB 状态灯</label>
            <select id="cfg-status-led">
              <option value="1">开启</option>
              <option value="0">关闭</option>
            </select>
          </div>
        </div>

        <div class="actions">
          <button id="btn-system-save" class="btn primary">保存设置</button>
          <button id="btn-system-reset" class="btn danger">恢复默认</button>
        </div>
        <div id="system-toast" class="toast"></div>
      </section>
    </main>
  </div>

  <script src="/app.js"></script>
</body>
</html>
